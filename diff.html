<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiffLab</title>
  <link rel="stylesheet" href="lib/hljs-light.css" id="hljs-theme" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body data-theme="light">
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M6 3a3 3 0 1 0 1 5.83V15.17A3 3 0 1 0 9 18a3 3 0 0 0-1-2.83V8.83A3 3 0 0 0 9 6a3 3 0 0 0-3-3Zm0 2a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm0 12a1 1 0 1 1 0 2 1 1 0 0 1 0-2ZM18 3a3 3 0 0 0-1 5.83V13a3 3 0 0 1-3 3h-1.17A3 3 0 1 0 13 18h1a5 5 0 0 0 5-5V8.83A3 3 0 0 0 18 3Zm0 2a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-8 12a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/>
      </svg>
      <h1>DiffLab</h1>
      <span class="version">v1.0</span>
    </div>

    <div class="controls">
      <label class="control">
        <span>Format</span>
        <select id="format">
          <option value="text">Text / Code</option>
          <option value="json">JSON</option>
          <option value="xml">XML / HTML</option>
          <option value="csv">CSV</option>
          <option value="image">Image</option>
          <option value="pdf">PDF (text)</option>
        </select>
      </label>

      <div id="format-options" class="format-options" hidden></div>

      <label class="control">
        <span>Language</span>
        <select id="language">
          <option value="auto">Auto-detect</option>
          <option value="plaintext">Plain text</option>
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
          <option value="c">C</option>
          <option value="csharp">C#</option>
          <option value="go">Go</option>
          <option value="rust">Rust</option>
          <option value="ruby">Ruby</option>
          <option value="php">PHP</option>
          <option value="kotlin">Kotlin</option>
          <option value="swift">Swift</option>
          <option value="sql">SQL</option>
          <option value="json">JSON</option>
          <option value="yaml">YAML</option>
          <option value="xml">XML / HTML</option>
          <option value="css">CSS</option>
          <option value="bash">Shell / Bash</option>
          <option value="markdown">Markdown</option>
          <option value="dockerfile">Dockerfile</option>
        </select>
      </label>

      <label class="control toggle">
        <input type="checkbox" id="ignore-ws" />
        <span>Ignore whitespace</span>
      </label>

      <label class="control toggle" title="Collapse cosmetic changes, show renames as pills, detect moved blocks">
        <input type="checkbox" id="semantic" />
        <span>Semantic</span>
      </label>

      <div class="control segmented" role="tablist" aria-label="View mode">
        <button class="seg active" data-view="split" role="tab" aria-selected="true">Split</button>
        <button class="seg" data-view="unified" role="tab" aria-selected="false">Unified</button>
      </div>

      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-3.14-9.8c-.45-.07-.9-.1-1.36-.1Z"/>
        </svg>
      </button>
    </div>
  </header>

  <section class="inputs" id="inputs">
    <div class="pane">
      <div class="pane-head">
        <h2>Original</h2>
        <div class="pane-actions">
          <label class="file-btn" title="Load file">
            <input type="file" class="file-input" data-target="left" hidden />
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm0 7V3.5L19.5 9H14Z"/></svg>
            File
          </label>
          <button class="ghost-btn" data-clear="left">Clear</button>
        </div>
      </div>
      <textarea id="left" class="code-input" spellcheck="false" placeholder="Paste original code or drop a file…"></textarea>
    </div>

    <div class="swap-col">
      <button id="swap" class="icon-btn" title="Swap panes" aria-label="Swap left and right">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M7 4l-4 4 4 4V9h10V7H7V4zm10 8v3H7v-2l-4 4 4 4v-3h12v-6h-2z"/></svg>
      </button>
    </div>

    <div class="pane">
      <div class="pane-head">
        <h2>Modified</h2>
        <div class="pane-actions">
          <label class="file-btn" title="Load file">
            <input type="file" class="file-input" data-target="right" hidden />
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm0 7V3.5L19.5 9H14Z"/></svg>
            File
          </label>
          <button class="ghost-btn" data-clear="right">Clear</button>
        </div>
      </div>
      <textarea id="right" class="code-input" spellcheck="false" placeholder="Paste modified code or drop a file…"></textarea>
    </div>
  </section>

  <section class="action-bar">
    <button id="compare" class="primary-btn">Compare</button>
    <div id="stats" class="stats" hidden>
      <span class="stat additions"><b id="add-count">0</b> additions</span>
      <span class="stat deletions"><b id="del-count">0</b> deletions</span>
      <span class="stat changed"><b id="hunk-count">0</b> hunks</span>
    </div>
    <div class="result-actions" id="result-actions" hidden>
      <button id="prev-hunk" class="ghost-btn" title="Previous hunk (p)">↑ Prev</button>
      <button id="next-hunk" class="ghost-btn" title="Next hunk (n)">↓ Next</button>
      <button id="copy-patch" class="ghost-btn" title="Copy as unified diff">Copy patch</button>
    </div>
  </section>

  <section id="result" class="result" aria-live="polite"></section>

  <footer class="footer">
    <span>Local-only · No data leaves your browser · <kbd>n</kbd>/<kbd>p</kbd> to navigate hunks</span>
  </footer>

  <script src="lib/diff_match_patch.js"></script>
  <script src="lib/highlight.min.js"></script>
  <script src="js/core/adapter-registry.js"></script>
  <script src="js/core/semantic-analyzer.js"></script>
  <script src="js/diff-engine.js"></script>
  <script src="js/render.js"></script>
  <script src="js/adapters/text.js"></script>
  <script src="js/adapters/json.js"></script>
  <script src="js/adapters/xml.js"></script>
  <script src="js/adapters/csv.js"></script>
  <script src="js/adapters/image.js"></script>
  <script src="js/adapters/pdf.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
